<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum - Gerenciar Aulas</title>

    <link rel="stylesheet" href="../css/trilhas.css?v=1">
    <link rel="stylesheet" href="../css/edit_curso.css?v=1">
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="logo-container">
            <img src="../Imagens/logo.png" alt="Logo" class="logo">
            <span class="school-name">SpectrumTI</span>
        </div>

        <nav class="nav-menu">
            <a href="trilhas.html">Minhas Trilhas</a>
        </nav>
    </div>

    <div class="user-profile">
        <div class="user-info">
            <span>Olá,</span>
            <strong id="user-name">Usuário</strong>
        </div>
        <div id="user-icon" class="user-icon">👤</div>
        <div id="user-dropdown" class="user-dropdown">
            <a href="perfil.html">Perfil</a>
            <a href="../backend/logout.php">Sair</a>
        </div>
    </div>
</header>

<main class="container-aulas">

    <section class="editor-area">
        <div class="card">
            <div class="card-header-aula">
                <h2 id="titulo_editor">Nova Aula</h2>
                <button id="btnNovaAula" class="btn-primary">+ Nova Aula</button>
            </div>

            <form id="formCurso" class="form-aula">
                <input type="hidden" id="id_curso" name="id_curso">
                <input type="hidden" id="id_trilha_hidden" name="id_trilha">

                <div class="form-row">
                    <div class="form-group">
                        <label>Título da Aula</label>
                        <input type="text" id="nome_aula" name="nome" required>
                    </div>

                    <div class="form-group" style="max-width: 100px;">
                        <label>Ordem</label>
                        <input type="number" id="ordem" name="ordem" min="1" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descrição Curta</label>
                    <textarea id="descricao_aula" name="descricao"></textarea>
                </div>

                <div class="form-group">
                    <label>Link do Vídeo</label>
                    <input type="text" id="aula_video" name="aula_video">
                    <div id="video_preview" class="video-container" style="display:none;"></div>
                </div>

                <div class="form-group">
                    <label>Conteúdo</label>
                    <textarea id="aula_texto" name="aula_texto"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status_aula" name="status">
                            <option value="0">0 - Criado</option>
                            <option value="1">1 - Ativo</option>
                            <option value="3">3 - Inativo</option>
                        </select>
                    </div>

                    <div class="form-group info-metadados">
                        <p>Criado: <span id="data_criacao">--</span></p>
                        <p>Atualizado: <span id="updated_at">--</span></p>
                    </div>
                </div>

                <div class="actions-aula">
                    <button type="button" id="btnExcluirAula" class="btn-del" style="display:none;">Excluir Aula</button>
                    <button type="submit" class="btn-primary">Salvar Aula</button>
                </div>
            </form>
        </div>
    </section>

    <aside class="sidebar-aulas">
        <div class="card">
            <h3 class="sidebar-title">Conteúdo da Trilha</h3>
            <div id="listaAulas" class="lista-aulas-scroll"></div>
        </div>
    </aside>

</main>

<script src="../js/edit_curso.js?v=1"></script>
</body>
</html>
